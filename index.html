<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Materiali Oratori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<!-- TOPBAR -->
<nav class="topbar" aria-label="Barra di navigazione principale">
  <div class="topbar-inner">
    <div class="logo">materiali <span>oratori</span></div>
    <div class="topbar-actions">
      <button class="btn" onclick="exportPDF()" title="Esporta PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Esporta PDF
      </button>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main">

  <!-- Oratorio selector -->
  <div class="oratorio-bar">
    <div class="oratorio-tabs" id="oratorio-tabs" role="tablist" aria-label="Seleziona oratorio"></div>
    <button class="btn btn-ghost" onclick="showModal()" title="Aggiungi oratorio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Nuovo oratorio
    </button>
  </div>

  <!-- Summary -->
  <div class="summary" id="summary" role="region" aria-label="Riepilogo stato materiali"></div>

  <!-- Categories -->
  <div class="categories" id="categories"></div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <h3 id="modal-title">Nuovo oratorio</h3>
    <div class="modal-field">
      <label for="modal-input">Nome oratorio</label>
      <input type="text" id="modal-input" placeholder="es. Pombio" autocomplete="off" />
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="confirmAddOratorio()">Aggiungi</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
